site_name: Material Aula - 2026 - Fatec
site_url: https://thissyalmeida.github.io/materialAula-2026-Fatec/
use_directory_urls: false

theme:
  name: material
  language: pt-BR

  palette:
    - scheme: default
      primary: red
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Modo escuro

    - scheme: slate
      primary: red
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

# EXTENSÕES IMPORTANTES
markdown_extensions:
  - attr_list
  - tables
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.details

# CSS PERSONALIZADO
extra_css:
  - assets/stylesheets/style.css

nav:
  - Boas-vindas: index.md

  - ALP - Algoritmos e Lógica de Programação:
    - Lógica e Raciocínio:
        - Lógica e Raciocínio: ALP/aula-01/logica-e-raciocinio.md
        - Exemplos: ALP/.md
    - Conceitos iniciais de Algoritmos:
        - Formas de Representação de Algoritmos: ALP/aula-02/formas-de-representacao-de-algoritmos.md
        - Exemplos: ALP/aula-02/exemplos-formas-de-representacao.md
    - Linguagem de Programação:
        - Linguagem de Programação: ALP/aula-03/linguagem-de-programacao.md
        - Exemplos: ALP/aula-03/.md
        
    - Linguagens:
        - C:
            - Conteudo: ALP/C/conteudo-c.md
            - Exemplos: ALP/C/exemplos-c.md
        - Java:
            - Conteudo: ALP/Java/conteudo-java.md
            - Exemplos: ALP/Java/exemplos-java.md
        - JavaScript:
            - Conteudo: ALP/JavaScript/conteudo-javascript.md
            - Exemplos: ALP/JavaScript/exemplos-javascript.md
        - Kotlin:
            - Conteudo: ALP/Kotlin/conteudo-kotlin.md
            - Exemplos: ALP/Kotlin/exemplos-kotlin.md
        - Python:
            - Conteudo: ALP/Python/conteudo-python.md
            - Exemplos: ALP/Python/exemplos-python.md
        
  - EST - Estrutura de Dados:
    - Listas, Pilhas e Filas:
        - Exercícios: ED/aula1-introducao.md
    - Árvores e Grafos:
        - Exercícios: ED/index.md


